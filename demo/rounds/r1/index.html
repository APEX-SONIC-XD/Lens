<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme · Round 1</title>
    <style>
      :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a1a; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #fafbfc; }
      .fixture { background: #111827; color: #fff; font-size: 12px; padding: 8px 16px; display: flex; gap: 12px; align-items: center; }
      .fixture a { color: #93c5fd; }
      .hero { max-width: 720px; margin: 0 auto; padding: 80px 24px; text-align: center; }
      .hero h1 { font-size: 40px; margin: 0 0 16px; }
      .hero p { font-size: 18px; color: #4b5563; }
      .hero button { margin-top: 24px; background: #2f6df6; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="fixture">
      <strong>Local rounds fixture</strong>
      <span>Round 1 — first concept</span>
      <a href="/demo/">back to demo</a>
    </div>

    <div class="hero">
      <h1 id="headline" data-comment-anchor="r1-headline">Ship faster with Acme.</h1>
      <p data-comment-anchor="r1-subhead">A single, centered landing page — the first thing the team reviewed.</p>
      <button data-comment-anchor="r1-cta">Get started</button>
    </div>

    <script type="module" src="/demo/rounds/_mount.js"></script>
  </body>
</html>
