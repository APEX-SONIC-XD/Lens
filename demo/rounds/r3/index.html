<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme · Round 3</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #f3f4f6; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #0b1120; }
      .fixture { background: #000; color: #fff; font-size: 12px; padding: 8px 16px; display: flex; gap: 12px; align-items: center; }
      .fixture a { color: #93c5fd; }
      .hero { text-align: center; padding: 96px 24px 48px; }
      .hero h1 { font-size: 48px; margin: 0 0 16px; background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .hero p { color: #9ca3af; font-size: 18px; }
      .pricing { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 920px; margin: 24px auto 80px; padding: 0 24px; }
      .plan { border: 1px solid #1f2937; border-radius: 12px; padding: 24px; background: #111827; text-align: center; }
      .plan .price { font-size: 32px; font-weight: 700; }
      @media (max-width: 720px) { .pricing { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="fixture">
      <strong>Local rounds fixture</strong>
      <span>Round 3 (latest) — dark redesign with pricing</span>
      <a href="/demo/">back to demo</a>
    </div>

    <div class="hero">
      <h1 data-comment-anchor="r3-headline">The final direction.</h1>
      <p data-comment-anchor="r3-copy">Round 3 went dark and added pricing. This is the latest round, so the toolbar should NOT show the archived banner here.</p>
    </div>

    <div class="pricing">
      <div class="plan" data-comment-anchor="r3-p1"><h3>Starter</h3><div class="price">$0</div></div>
      <div class="plan" data-comment-anchor="r3-p2"><h3>Team</h3><div class="price">$29</div></div>
      <div class="plan" data-comment-anchor="r3-p3"><h3>Scale</h3><div class="price">$99</div></div>
    </div>

    <script type="module" src="/demo/rounds/_mount.js"></script>
  </body>
</html>
